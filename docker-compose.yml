version: '3.8'

services:
  # ==========================================
  # Service 1: Main Payment API
  # ==========================================
  payment-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: payment-api
    restart: unless-stopped
    ports:
      - '${PORT:-3000}:${PORT:-3000}'
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      HOST: ${HOST:-0.0.0.0}
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    networks:
      - payment-network
    depends_on:
      - stellar-listener

  # ==========================================
  # Service 2: Stellar Blockchain Listener
  # ==========================================
  stellar-listener:
    build:
      context: .
      dockerfile: Dockerfile.listener
      target: production
    container_name: stellar-listener
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
    volumes:
      - ./logs:/app/logs
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
    networks:
      - payment-network

networks:
  payment-network:
    driver: bridge
