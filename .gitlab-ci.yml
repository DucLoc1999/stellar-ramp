stages:
  - test
  - deploy

# ==========================================
# STAGE 1: CI / Testing (GitLab Cloud Infrastructure)
# ==========================================
test_application:
  stage: test
  image: node:24-alpine
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
  script:
    - npm ci
    - npx tsc --noEmit
    - npm test
  allow_failure: false
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ==========================================
# STAGE 2: CD / Bare-Metal Deploy (Runs on Your Production Server)
# ==========================================
deploy_to_production:
  stage: deploy
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  tags:
    - prod-deploy
  needs: ["test_application"]
  script:
    - echo "Executing light-weight bare-metal deployment..."

    # 1. Navigate to your live application directory
    - cd /mnt/code/be/usdt247-payment

    # 2. Fetch changes (pulling only those 1-2 altered characters)
    - git pull origin main

    # 3. Smart Dependency Check
    # Compares the current commit to the previous one. If package.json didn't change,
    # it skips 'npm i' entirely, saving massive disk I/O and time.
    - |
      if git diff --name-only HEAD~1 HEAD | grep -q "package.json"; then
        echo "package.json modified. Running npm install..."
        npm i
      else
        echo "No changes in package.json. Skipping dependency installation."
      fi

    # 4. RAM Capping for Production Safety
    # Prevents Node.js from consuming 100% of your server's RAM during compilation,
    # which could otherwise crash your live app instance.
    - export NODE_OPTIONS="--max-old-space-size=2048"
    - npm run build

    # 5. Zero-Downtime Service Reload
    # Using 'reload' instead of 'restart' keeps your app online for users
    # by hot-swapping the active processes smoothly via PM2.
    - pm2 reload ecosystem.config.js || pm2 start ecosystem.config.js

    # 6. Migration (if needed, runs silently)
    - npm run migrate:prod || true
