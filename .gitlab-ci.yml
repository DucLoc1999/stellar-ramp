stages:
  - test
  - deploy

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/

# Type-check and test in CI container (catch errors before deploy)
test:
  image: node:24-alpine
  stage: test
  script:
    - npm ci
    - npx tsc --noEmit
    - npm test
  allow_failure: false
  only:
    - main

# Deploy via runner on server (fast, direct)
deploy:
  stage: deploy
  tags:
    - debian-server
  needs: ["test"]
  script:
    - cd /var/www/my-project
    - git pull origin main
    - npm install --production
    - npm run build
    - npm run migrate:prod || true
    - pm2 restart ecosystem.config.js
  only:
    - main
  when: manual
