version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: usdt247-app
    restart: unless-stopped

    # ============================================================================
    # NETWORK CONFIGURATION - EXTERNAL DATABASE
    # ============================================================================
    # Using bridge network mode to connect to external MySQL server at 10.0.0.28
    # Port mapping allows the application to be accessed from the host
    # ============================================================================
    ports:
      - '${PORT:-8001}:${PORT:-8001}'

    # ============================================================================
    # ALTERNATIVE: For localhost MySQL (COMMENTED OUT)
    # ============================================================================
    # If you need to connect to MySQL running on the Docker host:
    #
    # network_mode: host  # For Linux only
    #
    # OR for macOS/Windows:
    # extra_hosts:
    #   - 'host.docker.internal:host-gateway'
    # And update DB_HOST in .env to: host.docker.internal
    # ============================================================================

    # Load environment variables from .env file
    env_file:
      - .env

    environment:
      # Application Configuration (non-sensitive, can be overridden)
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-8001}
      HOST: ${HOST:-0.0.0.0}
      LOG_LEVEL: ${LOG_LEVEL:-info}

      # Swagger/OpenAPI Configuration
      # Production URL for Swagger UI (e.g., https://api.yourdomain.com)
      # Leave empty for development (will use localhost:PORT)
      URL_SWAGGER: ${URL_SWAGGER}

      # Database Configuration
      # All database values are loaded from .env file via env_file directive
      # No defaults specified - will use exact values from .env
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}

      # Pay Configuration
      API_PAY: ${API_PAY}
      PARTNER_APP_KEY: ${PARTNER_APP_KEY}

      # Webhook Configuration
      WEBHOOK_PUBLIC_KEY: ${WEBHOOK_PUBLIC_KEY}

    volumes:
      # Mount logs directory to persist logs on host
      # The docker-entrypoint.sh script automatically fixes permissions at startup
      # This works correctly on Linux with host network mode
      # Update data folder
      - ./logs:/app/logs
      - ./data:/app/data

    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:8001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # Logging configuration
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'
